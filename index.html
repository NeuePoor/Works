<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works - Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            color: #111;
        }

        header {
            padding: 40px;
            font-size: 28px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: 160px;
            gap: 20px;
            padding: 40px;
        }

        .project {
            position: relative;
            display: block;
            overflow: hidden;
            border-radius: 6px;
            text-decoration: none;
            color: white;
            font-size: 18px;
            transition: transform 0.25s ease;
        }

        .project span {
            position: absolute;
            bottom: 14px;
            left: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .project:hover {
            transform: scale(1.03);
        }

        /* Grid Sizing */
        .large { grid-column: span 3; grid-row: span 3; }
        .medium { grid-column: span 2; grid-row: span 2; }
        .small { grid-column: span 1; grid-row: span 1; }
        .wide { grid-column: span 3; grid-row: span 1; }
        .tall { grid-column: span 1; grid-row: span 3; }

        .textblock {
            grid-column: span 2;
            grid-row: span 2;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f4f4;
            color: #111;
            font-size: 20px;
            padding: 20px;
            line-height: 1.4;
            text-align: center;
        }

        /* Colors */
        .color1 { background: #ff6b6b; }
        .color2 { background: #6bc5ff; }
        .color3 { background: #6bff95; }
        .color4 { background: #ffc96b; }
        .color5 { background: #b06bff; }
        .color6 { background: #ff6bd6; }
        .color7 { background: #7d7d7d; }

        /* Responsive */
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
                grid-auto-rows: 140px;
                padding: 20px;
            }
            .large { grid-column: span 3; }
            .medium { grid-column: span 2; }
            .wide { grid-column: span 2; }
            .textblock { grid-column: span 3; grid-row: span 1; }
        }
    </style>
</head>
<body>

<header>Works</header>

<main class="grid">
    <a class="project large color1" href="/works/2503001/">
        <span>2503001</span>
    </a>

    <a class="project medium color2" href="/works/2503002/">

    </a>

    <a class="project small color3" href="/works/2503003/">
        <span>2503003</span>
    </a>

    <a class="project tall color4" href="/works/2503004/">
        <span>2503004</span>
    </a>

    <div class="textblock">
        Experimental Typography<br>and Interactive Projects
    </div>

    <a class="project wide color5" href="/works/2503005/">
        <span>2503005</span>
    </a>

    <a class="project medium color6" href="/works/2503006/">
        <span>2503006</span>
    </a>

    <a class="project small color7" href="/works/2503007/">
        <span>2503007</span>
    </a>

    <a class="project medium color1" href="/works/2503008/">
        <span>2503008</span>
    </a>

    <a class="project wide color2" href="/works/2503009/">
        <span>2503009</span>
    </a>
</main>

</body>
</html>
