<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Works - 3D 模型预览</title>
    <!-- 引入用于渲染 3D 模型的 Google model-viewer 脚本 -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            color: #1a1a1a;
            /* 优化移动端滚动体验 */
            -webkit-tap-highlight-color: transparent;
        }

        h1 {
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .gallery {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* 统一的作品项容器 */
        .gallery-item {
            width: 100%;
            margin-bottom: 40px;
            background-color: #fcfcfc;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #f0f0f0;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* PC 端悬停效果 */
        @media (hover: hover) {
            .gallery-item:hover {
                box-shadow: 0 12px 40px rgba(0,0,0,0.06);
            }
        }

        /* 3D 模型播放器 */
        model-viewer {
            width: 100%;
            height: 550px;
            background-color: #fcfcfc;
            --poster-color: transparent;
            outline: none;
            /* 确保触摸操作仅限于模型交互 */
            touch-action: pan-y;
        }

        /* 图片占位样式 */
        .gallery-item img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* 交互提示 */
        .model-info {
            padding: 15px 20px;
            font-size: 0.8rem;
            color: #999;
            text-align: center;
            width: 100%;
            border-top: 1px solid #f5f5f5;
            background: #fff;
        }

        /* 加载中的状态显示 */
        .progress-bar {
            display: block;
            width: 33%;
            height: 4px;
            max-height: 2px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 1px;
            background-color: rgba(0, 0, 0, 0.1);
        }
        .update-bar {
            background-color: rgba(0, 0, 0, 0.4);
            width: 0%;
            height: 100%;
            border-radius: 1px;
            transition: width 0.3s;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            model-viewer {
                height: 400px; /* 手机端适当缩小高度 */
            }
            h1 {
                margin-bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <h1>Works</h1>

    <section class="gallery">
        
        <!-- 3D 模型展示项 -->
        <div class="gallery-item">
            <!-- 
                交互方案调整说明：
                1. disable-zoom: 禁用缩放。在手机端滚动页面时，若不禁用缩放，用户双指操作会误放大模型。
                2. touch-action="pan-y": 允许用户在触摸模型时仍能上下滑动页面。
                3. interaction-prompt="auto": 仅在用户长时间未操作时给予轻微提示。
            -->
            <model-viewer 
                id="candle-viewer"
                src="https://folio.neuepoor.com/candle-v1.glb" 
                alt="Candle v1 3D Model"
                auto-rotate
                rotation-per-second="30deg"
                camera-controls
                disable-zoom
                interaction-prompt="auto"
                shadow-intensity="1.5"
                environment-image="neutral"
                exposure="1.2"
                crossorigin="anonymous">
                
                <!-- 自定义加载进度条 -->
                <div class="progress-bar" slot="progress-bar">
                    <div class="update-bar"></div>
                </div>
            </model-viewer>
            <div class="model-info">
                <!-- 针对不同设备的动态提示文字 -->
                <span class="pc-hint">鼠标拖拽 360° 旋转</span>
                <span class="mobile-hint" style="display:none;">单指旋转，双指移动视角</span>
            </div>
        </div>

        <br/><br/>

        <div class="gallery-item">
            <br/>
            <img src="" alt="等待添加的作品图片">
            <br/>
        </div>

        <br/><br/>

        <div class="gallery-item">
            <br/>
            <img src="" alt="等待添加的作品图片">
            <br/>
        </div>

    </section>

    <script>
        const modelViewer = document.querySelector('#candle-viewer');
        const progressBar = document.querySelector('.update-bar');
        const pcHint = document.querySelector('.pc-hint');
        const mobileHint = document.querySelector('.mobile-hint');

        // 检测触摸设备并切换提示语
        if ('ontouchstart' in window) {
            pcHint.style.display = 'none';
            mobileHint.style.display = 'inline';
        }

        // 处理加载进度条逻辑
        modelViewer.addEventListener('progress', (event) => {
            const progress = event.detail.totalProgress;
            progressBar.style.width = `${progress * 100}%`;
            if (progress === 1) {
                setTimeout(() => {
                    progressBar.parentElement.style.display = 'none';
                }, 300);
            }
        });

        // 错误处理提示
        modelViewer.addEventListener('error', () => {
            console.error("无法加载模型。请检查 R2 的 CORS 设置是否允许此域名的访问。");
        });
    </script>

</body>
</html>
