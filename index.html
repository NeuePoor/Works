<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<title>Folio | v3.8</title>
<style>
  :root {
    --fl-bg: #ffffff;
    --fl-text: #000000;
    --fl-nav-bg-m: rgba(255, 255, 255, 0.7);
    --fl-nav-h-m: 44px; 
    --fl-font-main: -apple-system, BlinkMacSystemFont, sans-serif;
    --fl-ease: cubic-bezier(0.23, 1, 0.32, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root { --fl-bg: #000000; --fl-text: #ffffff; --fl-nav-bg-m: rgba(28, 28, 30, 0.8); }
  }

  /* --- 核心修复：解决 Safari 无痕模式色块 --- */
  html {
    /* 1. 强制将 html 背景提升为系统渲染底色 */
    background-color: var(--fl-bg) !important;
    /* 2. 禁止 html 锁定高度，允许其根据内容无限延伸 */
    height: auto !important;
    min-height: 100%;
    margin: 0;
    padding: 0;
    transition: background 0.5s var(--fl-ease);
  }

  body {
    margin: 0;
    padding: 0;
    background-color: var(--fl-bg);
    /* 3. 移除所有 dvh 限制，避免 Safari 动态 UI 导致的计算延迟 */
    min-height: 100vh;
    width: 100%;
    display: block;
    overflow-x: hidden;
    -webkit-text-size-adjust: 100%;
  }

  /* 作品栅格 */
  .fl-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 4px;
    margin: 4px;
    padding: 80px 0 120px;
  }

  /* 导航栏 */
  .fl-header {
    position: fixed; width: 100%; z-index: 9999;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px; height: 60px; top: 0;
    mix-blend-mode: difference;
    transition: transform 0.5s var(--fl-ease), opacity 0.5s var(--fl-ease);
  }

  @media (max-width: 768px) {
    .fl-grid {
      /* 4. 关键：底部预留超大内边距，确保内容能穿透并填满 Safari 标签栏下方 */
      padding: 20px 0 calc(160px + env(safe-area-inset-bottom)) !important;
    }

    .fl-header {
      top: auto;
      bottom: calc(12px + env(safe-area-inset-bottom)) !important;
      left: 12px;
      width: calc(100% - 24px);
      height: var(--fl-nav-h-m) !important;
      padding: 0 16px !important;
      border-radius: 10px;
      background: var(--fl-nav-bg-m);
      backdrop-filter: blur(20px) saturate(180%);
      mix-blend-mode: normal;
      transition: transform 0.5s cubic-bezier(0.2, 0, 0.2, 1), opacity 0.4s linear;
    }

    .fl-header.menu-hidden {
      /* 5. 纯位移隐藏 */
      transform: translateY(calc(100% + 80px));
      opacity: 0;
      pointer-events: none;
    }
  }

  /* 作品项基础样式（简化示意） */
  .fl-item-wrapper { grid-column: span 12; margin-bottom: 20px; }
  .fl-item { width: 100%; height: 50vh; background: #eee; border-radius: 4px; display: block; }
</style>
</head>
<body>

<header class="fl-header" id="navbar">
  <div class="type-nav" style="color:inherit">Fo</div>
  <div class="type-nav" style="color:inherit">Works</div>
</header>

<main class="fl-grid" id="main-grid">
  <div class="fl-item-wrapper"><div class="fl-item"></div></div>
  <div class="fl-item-wrapper"><div class="fl-item"></div></div>
  <div class="fl-item-wrapper"><div class="fl-item"></div></div>
</main>

<script>
  const DS_ENGINE = {
    // 注入视口修复逻辑
    initViewportFix() {
      const fix = () => {
        // 实时同步 innerHeight 到 CSS 变量，但不锁定 html 高度
        document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
      };
      window.addEventListener('resize', fix);
      window.addEventListener('orientationchange', fix);
      fix();
    },

    initScrollMonitor() {
      let scrollTimer = null;
      const navbar = document.getElementById('navbar');
      window.addEventListener('scroll', () => {
        if (window.innerWidth > 768) return;
        navbar.classList.add('menu-hidden');
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(() => {
          navbar.classList.remove('menu-hidden');
        }, 250);
      }, { passive: true });
    },

    start() {
      this.initViewportFix();
      this.initScrollMonitor();
      // 其他初始化代码...
    }
  };
  DS_ENGINE.start();
</script>
</body>
</html>
