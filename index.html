<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<!-- 
  项目名称: Folio Design System
  版本: v3.6 (Safari Full-Screen Lock & Theme Sync)
  
  核心变更:
  - 修复 Safari 断层：HTML 根节点背景锁定与物理视口强制填充。
  - 动态 Theme-Color：自动同步系统 UI 颜色（状态栏/底座）。
  - 安全区补偿：精细化移动端底部间距，防止 UI 撕裂。
  - 维持 v3.5 的 250ms 显隐逻辑与高度锁定。
-->
<title>Folio | v3.6</title>
<link id="favicon" rel="icon" type="image/webp" href="https://folio.neuepoor.com/Favicon.webp">

<style>
  /* ==========================================================================
     1. DESIGN TOKENS
     ========================================================================== */
  :root {
    --fl-bg: #ffffff;
    --fl-text: #000000;
    --fl-nav-bg-m: rgba(255, 255, 255, 0.7);
    --fl-gutter: 4px; 
    --fl-margin: 4px;
    --fl-nav-h: 60px;
    --fl-nav-h-m: 44px; 
    --fl-font-main: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
    --fl-reveal-dist: 20px;
    --fl-reveal-dur: 0.8s;
    --fl-ease: cubic-bezier(0.23, 1, 0.32, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root { 
      --fl-bg: #000000; 
      --fl-text: #ffffff; 
      --fl-nav-bg-m: rgba(28, 28, 30, 0.8); 
    }
  }

  /* --- 全局底层锁定 (解决 Safari 露底问题) --- */
  html {
    background: var(--fl-bg); 
    height: -webkit-fill-available; /* 强制 iOS 撑满物理视口 */
    transition: background 0.5s var(--fl-ease); 
  }

  /* ==========================================================================
     2. TYPOGRAPHY RULES
     ========================================================================== */
  html, body { 
    font-family: var(--fl-font-main); 
    color: var(--fl-text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }

  .type-nav { font-size: var(--fl-fs-nav); font-weight: 700; letter-spacing: -0.05em; text-decoration: none; color: #fff; }
  .type-info { font-size: var(--fl-fs-info); line-height: var(--fl-lh-info); opacity: var(--fl-op-info); }
  .type-item { font-size: var(--fl-fs-item); font-weight: 600; transition: opacity 0.6s var(--fl-ease), transform 0.6s var(--fl-ease); }
  .type-archive { font-size: 10px; font-weight: 600; text-decoration: none; color: var(--fl-text); transition: opacity 0.3s; }
  .type-archive:hover { opacity: 0.5; }

  @media (max-width: 768px) {
    .type-nav { font-size: var(--fl-fs-nav-m); }
    .type-info { font-size: var(--fl-fs-info-m); }
    .type-item { font-size: var(--fl-fs-item-m); }
  }

  /* ==========================================================================
     3. LAYOUT & COMPONENTS
     ========================================================================== */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { 
    margin: 0; 
    padding: 0; 
    background: var(--fl-bg); 
    overflow-x: hidden; 
    min-height: 100vh; 
    min-height: 100dvh; 
    overscroll-behavior-y: none; /* 移动端下拉锁定 */
  }

  .fl-grid {
    display: grid; 
    grid-template-columns: repeat(12, 1fr);
    gap: var(--fl-gutter); 
    margin: var(--fl-margin);
    padding: 80px 0 120px;
  }

  .fl-header {
    position: fixed; width: 100%; z-index: 999;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px; height: var(--fl-nav-h); top: 0;
    mix-blend-mode: difference;
    transition: transform 0.5s var(--fl-ease), opacity 0.5s var(--fl-ease);
  }

  .fl-logo { height: 100%; display: flex; align-items: center; text-decoration: none; color: inherit; }
  .fl-logo__video, .fl-logo__gif { height: 48px; width: auto; display: none; }

  .fl-nav { display: flex; gap: 40px; }
  .fl-nav__link { transition: opacity 0.3s; }
  .fl-nav__link:hover { opacity: 0.3; }

  @media (max-width: 768px) {
    .fl-grid { 
      /* 动态安全区填补：当导航栏消失，内容自动填补不露底 */
      padding: 20px 0 calc(80px + env(safe-area-inset-bottom)) !important; 
    }
    .fl-header {
      top: auto; 
      bottom: calc(12px + env(safe-area-inset-bottom)) !important; 
      left: 12px;
      width: calc(100% - 24px); 
      height: var(--fl-nav-h-m) !important; 
      padding: 0 16px !important; 
      border-radius: 10px;
      background: var(--fl-nav-bg-m); 
      background-attachment: scroll; 
      backdrop-filter: blur(20px) saturate(180%); 
      border: 0.5px solid rgba(0,0,0,0.08);
      mix-blend-mode: normal; 
      overflow: hidden; 
      /* 强制独立复合层，解决渲染闪烁 */
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transition: transform 0.5s cubic-bezier(0.2, 0, 0.2, 1), opacity 0.4s linear;
      will-change: transform, opacity;
    }
    
    .fl-header.menu-hidden {
      transform: translateY(calc(100% + 60px)); 
      opacity: 0;
      pointer-events: none; 
    }

    .fl-header .type-nav { color: var(--fl-text); } 
    .fl-logo__video, .fl-logo__gif { height: 18px; }
  }

  .fl-info { margin-bottom: 20px; word-break: break-word; }
  .fl-info__title { display: block; margin-bottom: var(--fl-info-title-gap); font-weight: normal; }

  /* 作品项 */
  .fl-item-wrapper { position: relative; display: flex; flex-direction: column; }
  .fl-item {
    width: 100%; 
    height: 45vh; 
    border-radius: 4px; text-decoration: none;
    transition: transform 0.6s var(--fl-ease); overflow: hidden;
    position: relative; background-size: cover; background-position: center; background-color: #f5f5f5;
  }

  .span-1 { grid-column: span 12; }
  .span-2 { grid-column: span 8; }
  .span-3 { grid-column: span 4; }
  .span-4 { grid-column: span 6; }
  .span-5 { grid-column: span 6; }
  .span-6 { grid-column: span 3; }
  .span-7 { grid-column: span 9; }

  .fl-archive-wrapper { grid-column: span 12; margin-top: 40px; display: flex; align-items: center; }

  @media (min-width: 769px) {
    .type-item-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      mix-blend-mode: difference; z-index: 2; pointer-events: none;
    }
    .type-item { color: #fff; opacity: 0; transform: translateY(5px); }
    .fl-item-wrapper:hover .type-item { opacity: 1; transform: translateY(0); }
    .fl-item-wrapper:hover .fl-item { transform: scale(0.995); }
  }

  @media (max-width: 768px) {
    .fl-item-wrapper { grid-column: span 12 !important; margin-bottom: 28px; }
    .fl-item { 
      height: 60vh; 
      height: 60dvh; 
      order: 2; 
    }
    .type-item-container { order: 1; margin: 0 0 var(--fl-gutter) 0; display: block; mix-blend-mode: normal; }
    .type-item { color: var(--fl-text); opacity: 0; transform: translateY(10px); display: block; }
    .fl-item-wrapper.is-visible .type-item { opacity: 1; transform: translateY(0); transition-delay: 0.15s; }
    .fl-archive-wrapper { margin-top: 20px; }
  }

  .fl-reveal {
    opacity: 0; transform: translateY(var(--fl-reveal-dist));
    transition: opacity var(--fl-reveal-dur) var(--fl-ease), transform var(--fl-reveal-dur) var(--fl-ease);
    will-change: transform, opacity;
  }
  .fl-reveal.is-visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

  <header class="fl-header" id="navbar">
    <a href="/" class="fl-logo" id="logo">
      <video class="fl-logo__video" id="v" autoplay loop muted playsinline webkit-playsinline preload="auto"></video>
      <img class="fl-logo__gif" id="g" alt="Logo">
      <span class="fl-logo__text type-nav" id="t">Fo</span>
    </a>
    <nav class="fl-nav" id="ls"></nav>
  </header>

  <main class="fl-grid" id="main-grid"></main>

  <script>
    const SITE_CONFIG = {
      assets: {
        logoVideoWebm: "https://folio.neuepoor.com/head_chrome.webm",
        logoVideoMp4: "https://folio.neuepoor.com/head_safari.mov",
        logoGif: "https://folio.neuepoor.com/head_chrome.gif"
      },
      typography: {
        nav: { pc: "32px", mobile: "21px" },
        info: { pc: "10px", mobile: "10px", lineHeight: "1.4", opacity: "0.8", titleBottomGap: "4.2em" },
        item: { pc: "10px", mobile: "10px" }
      },
      navigation: [
        { name: 'Works', link: 'https://works.neuepoor.com' },
        { name: '(Play)', link: 'https://play.neuepoor.com' },
        { name: 'Me', link: 'https://me.neuepoor.com' }
      ],
      infoSections: [
        { title: "Works", content: "Branding<br>Vision identity<br>Look Book<br>Interface<br>Packaging<br>Editorial<br>Apparel", columnSpan: "grid-column: span 6" },
        { title: "Service", content: "Creative Direction<br>Art Direction<br>Graphic<br>Illustration<br>Motion<br>Typeface", columnSpan: "grid-column: span 4" },
        { title: "Contacts", content: "Email<br>Instagram<br>Github<br>小红书<br>Wechat", columnSpan: "grid-column: span 2" }
      ],
      fallbackProjects: [
        { 
          id: "02001", 
          tag: ["Branding"], 
          img: "https://folio.neuepoor.com/Me/3.png" 
        }
      ]
    };

    const DS_ENGINE = {
      async fetchData() {
        try {
          const response = await fetch('./data.json');
          if (!response.ok) throw new Error('JSON not found');
          const data = await response.json();
          return data.slice(0, 7);
        } catch (e) {
          console.warn('Using fallback data:', e.message);
          return Array(7).fill(SITE_CONFIG.fallbackProjects[0]);
        }
      },

      initStyles() {
        const root = document.documentElement;
        const ty = SITE_CONFIG.typography;
        root.style.setProperty('--fl-fs-nav', ty.nav.pc);
        root.style.setProperty('--fl-fs-nav-m', ty.nav.mobile);
        root.style.setProperty('--fl-fs-info', ty.info.pc);
        root.style.setProperty('--fl-fs-info-m', ty.info.mobile);
        root.style.setProperty('--fl-lh-info', ty.info.lineHeight);
        root.style.setProperty('--fl-op-info', ty.info.opacity);
        root.style.setProperty('--fl-info-title-gap', ty.info.titleBottomGap);
        root.style.setProperty('--fl-fs-item', ty.item.pc);
        root.style.setProperty('--fl-fs-item-m', ty.item.mobile);
      },

      // 动态同步系统 UI 颜色
      initThemeColor() {
        let meta = document.querySelector('meta[name="theme-color"]');
        if (!meta) {
          meta = document.createElement('meta');
          meta.name = "theme-color";
          document.head.appendChild(meta);
        }

        const updateColor = () => {
          // 实时抓取 CSS 变量中的背景色
          const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--fl-bg').trim();
          meta.content = bgColor;
        };

        updateColor();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateColor);
        // 延迟补偿：确保样式表加载完成后再次校准
        setTimeout(updateColor, 500);
      },

      initLogo() {
        const v = document.getElementById('v'), g = document.getElementById('g'), t = document.getElementById('t');
        g.src = SITE_CONFIG.assets.logoGif;
        v.innerHTML = `<source src="${SITE_CONFIG.assets.logoVideoWebm}" type="video/webm"><source src="${SITE_CONFIG.assets.logoVideoMp4}" type='video/mp4; codecs="hvc1"'>`;
        v.play().catch(() => { v.style.display = 'none'; g.style.display = 'block'; });
        v.oncanplay = () => { v.style.display = 'block'; g.style.display = 'none'; t.style.display = 'none'; };
      },

      initScrollMonitor() {
        let scrollTimer = null;
        const navbar = document.getElementById('navbar');

        window.addEventListener('scroll', () => {
          if (window.innerWidth > 768) return;

          // 只要在滚动，就立即隐藏导航栏
          navbar.classList.add('menu-hidden');

          clearTimeout(scrollTimer);

          // 250ms 延迟，确保在停止滚动后才重新显现
          scrollTimer = setTimeout(() => {
            navbar.classList.remove('menu-hidden');
          }, 250);
        }, { passive: true });
      },

      async renderUI() {
        const grid = document.getElementById('main-grid');
        const projects = await this.fetchData();
        
        const infoHTML = SITE_CONFIG.infoSections.map(sec => `
          <div class="fl-info fl-reveal type-info" style="${sec.columnSpan}">
            <b class="fl-info__title">${sec.title}</b>
            ${sec.content}
          </div>
        `).join('');
        
        const galleryHTML = projects.map((item, index) => `
          <div class="fl-item-wrapper span-${index + 1} fl-reveal">
            <div class="type-item-container">
              <span class="type-item">${item.id || 'Project'}</span>
            </div>
            <a href="/${item.id}/index.html" class="fl-item" style="background-image:url('${item.img}');"></a>
          </div>
        `).join('');

        const archiveHTML = `
          <div class="fl-archive-wrapper fl-reveal">
            <a href="/Archive/index.html" class="type-archive">Archive</a>
          </div>
        `;
        
        grid.innerHTML = infoHTML + galleryHTML + archiveHTML;
        this.initReveal();
      },

      initReveal() {
        const observer = new IntersectionObserver((entries) => { 
            entries.forEach(entry => { 
                if (entry.isIntersecting) { 
                    entry.target.classList.add('is-visible'); 
                    observer.unobserve(entry.target); 
                } 
            }); 
        }, { threshold: 0.1 });
        document.querySelectorAll('.fl-reveal').forEach(el => observer.observe(el));
      },

      start() { 
        this.initStyles(); 
        this.initThemeColor(); // 启动颜色同步
        this.initLogo(); 
        this.initScrollMonitor(); 
        document.getElementById('ls').innerHTML = SITE_CONFIG.navigation.map(n => `<a href="${n.link}" class="fl-nav__link type-nav">${n.name}</a>`).join('');
        this.renderUI(); 
      }
    };
    DS_ENGINE.start();
  </script>
</body>
</html>
