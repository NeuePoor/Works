<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<!-- 
  项目名称: Folio Design System
  版本: v4.2 (Structure Restored + Auto-Height Fix)
  
  核心变更说明:
  - 核心结构回退至 v4.0：保留完整的 Info 独立区、完整的 SITE_CONFIG 资产与排版配置。
  - 图片自适应修正：仅修改 Gallery 渲染逻辑，将背景图改为 <img> 标签以适应 url 图原始高度。
  - 功能恢复：恢复 Logo 视频/GIF 切换逻辑及全域滚动条隐藏。
-->
<title>Folio | v4.2</title>
<link id="favicon" rel="icon" type="image/webp" href="https://folio.neuepoor.com/Favicon.webp">

<style>
  /* ==========================================================================
     1. DESIGN TOKENS
     ========================================================================== */
  :root {
    --fl-bg: #ffffff;
    --fl-text: #000000;
    --fl-nav-bg-m: rgba(255, 255, 255, 0.7);
    --fl-gutter: 4px; 
    --fl-margin: 4px;
    --fl-nav-h: 60px;
    --fl-nav-h-m: 44px; 
    --fl-font-main: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "Segoe UI", Roboto, sans-serif;
    --fl-reveal-dist: 20px;
    --fl-reveal-dur: 0.8s;
    --fl-ease: cubic-bezier(0.23, 1, 0.32, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root { 
      --fl-bg: #000000; 
      --fl-text: #ffffff; 
      --fl-nav-bg-m: rgba(28, 28, 30, 0.8); 
    }
  }

  /* --- 全域隐藏滚动条 --- */
  html {
    background-color: var(--fl-bg) !important;
    height: 100%; 
    transition: background 0.5s var(--fl-ease);
    scrollbar-width: none; 
    -ms-overflow-style: none; 
  }
  html::-webkit-scrollbar, body::-webkit-scrollbar {
    display: none; width: 0 !important; height: 0 !important;
  }

  /* ==========================================================================
     2. TYPOGRAPHY RULES
     ========================================================================== */
  html, body { 
    font-family: var(--fl-font-main); 
    color: var(--fl-text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }

  .type-nav { font-size: var(--fl-fs-nav); font-weight: 700; letter-spacing: -0.05em; text-decoration: none; color: #fff; }
  .type-archive { font-size: 10px; font-weight: 600; text-decoration: none; color: var(--fl-text); transition: opacity 0.3s; }
  .type-archive:hover { opacity: 0.5; }

  /* Info 区排版配置 */
  .type-info { 
    font-size: var(--fl-info-fs); 
    line-height: var(--fl-info-lh); 
    opacity: var(--fl-info-op); 
  }
  .fl-info__title { 
    display: block; 
    margin-bottom: var(--fl-info-gap); 
    font-weight: normal; 
  }

  /* Gallery 区排版配置 */
  .type-item { 
    font-size: var(--fl-fs-item); 
    font-weight: 600; 
  }

  @media (max-width: 768px) {
    .type-nav { font-size: var(--fl-fs-nav-m); }
    .type-info { font-size: var(--fl-info-fs-m); }
    .fl-info__title { margin-bottom: var(--fl-info-gap-m); }
    .type-item { font-size: var(--fl-fs-item-m); }
  }

  /* ==========================================================================
     3. LAYOUT & COMPONENTS
     ========================================================================= */
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    margin: 0; padding: 0; 
    background-color: transparent !important;
    overflow-x: hidden; 
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior-y: none; 
  }

  .fl-main-container {
    padding: 80px 0 120px;
    margin: var(--fl-margin);
  }

  /* Info 区结构 (从 Gallery 独立) */
  .fl-info-section {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: var(--fl-gutter);
    margin-bottom: 60px;
  }

  /* Gallery 区结构 */
  .fl-gallery-section {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: var(--fl-gutter);
  }

  /* Header 逻辑 */
  .fl-header {
    position: fixed; width: 100%; z-index: 999;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 4px; height: var(--fl-nav-h); top: 0;
    mix-blend-mode: difference;
    transition: transform 0.5s var(--fl-ease), opacity 0.5s var(--fl-ease);
  }

  .fl-logo { height: 100%; display: flex; align-items: center; text-decoration: none; color: inherit; }
  .fl-logo__video, .fl-logo__gif { height: 48px; width: auto; display: none; }
  .fl-nav { display: flex; gap: 40px; }
  .fl-nav__link { transition: opacity 0.3s; }
  .fl-nav__link:hover { opacity: 0.3; }

  @media (max-width: 768px) {
    .fl-main-container { 
      padding: 20px 4px calc(140px + env(safe-area-inset-bottom)) !important; 
    }
    .fl-header {
      top: auto !important; 
      bottom: calc(12px + env(safe-area-inset-bottom)) !important; 
      left: 12px;
      width: calc(100% - 24px); 
      height: var(--fl-nav-h-m) !important; 
      padding: 0 16px !important; 
      border-radius: 10px;
      background: var(--fl-nav-bg-m); 
      backdrop-filter: blur(20px) saturate(180%); 
      border: 0.5px solid rgba(0,0,0,0.08);
      mix-blend-mode: normal; 
      overflow: hidden; 
      transform: translateZ(0);
      transition: transform 0.5s var(--fl-ease), opacity 0.4s linear;
    }
    .fl-header.menu-hidden { transform: translateY(calc(100% + 80px)); opacity: 0; pointer-events: none; }
    .fl-header .type-nav { color: var(--fl-text); } 
    .fl-logo__video, .fl-logo__gif { height: 18px; }
  }

  /* 作品项：强制 12 栏全宽 + 自适应高度 */
  .fl-item-wrapper { 
    grid-column: span 12; 
    position: relative; 
    display: flex; 
    flex-direction: column; 
    margin-bottom: var(--fl-gutter); 
  }
  .fl-item {
    width: 100%; 
    height: auto; 
    border-radius: 4px; 
    overflow: hidden; 
    display: block; 
    background-color: #f5f5f5;
  }
  /* 关键：使用 img 撑开容器 */
  .fl-item img {
    width: 100%;
    height: auto;
    display: block;
    transition: transform 0.6s var(--fl-ease);
  }

  .fl-archive-wrapper { grid-column: span 12; margin-top: 40px; display: flex; align-items: center; }

  @media (min-width: 769px) {
    .type-item-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      mix-blend-mode: difference; z-index: 2; pointer-events: none;
    }
    .type-item { color: #fff; opacity: 0; transform: translateY(5px); transition: all 0.6s var(--fl-ease); }
    .fl-item-wrapper:hover .type-item { opacity: 1; transform: translateY(0); }
    .fl-item-wrapper:hover img { transform: scale(1.005); }
  }

  @media (max-width: 768px) {
    .fl-item { order: 2; }
    .type-item-container { order: 1; margin: 0 0 var(--fl-gutter) 0; display: block; mix-blend-mode: normal; }
    .type-item { color: var(--fl-text); opacity: 0; transform: translateY(10px); display: block; transition: all 0.6s var(--fl-ease); }
    .fl-item-wrapper.is-visible .type-item { opacity: 1; transform: translateY(0); }
  }

  /* 动画 */
  .fl-reveal {
    opacity: 0; transform: translateY(var(--fl-reveal-dist));
    transition: opacity var(--fl-reveal-dur) var(--fl-ease), transform var(--fl-reveal-dur) var(--fl-ease);
  }
  .fl-reveal.is-visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

  <header class="fl-header" id="navbar">
    <a href="/" class="fl-logo" id="logo">
      <video class="fl-logo__video" id="v" autoplay loop muted playsinline preload="auto"></video>
      <img class="fl-logo__gif" id="g" alt="Logo">
      <span class="fl-logo__text type-nav" id="t">Fo</span>
    </a>
    <nav class="fl-nav" id="ls"></nav>
  </header>

  <main class="fl-main-container">
    <!-- Info 区 -->
    <div class="fl-info-section" id="info-root"></div>
    <!-- Gallery 区 -->
    <div class="fl-gallery-section" id="gallery-root"></div>
  </main>

  <script>
    const SITE_CONFIG = {
      assets: {
        logoVideoWebm: "https://folio.neuepoor.com/head_chrome.webm",
        logoVideoMp4: "https://folio.neuepoor.com/head_safari.mov",
        logoGif: "https://folio.neuepoor.com/head_chrome.gif",
        testImg: "https://folio.neuepoor.com/works/Quick%20Look%20Example-1.png"
      },
      typography: {
        nav: { pc: "32px", mobile: "21px" },
        item: { pc: "10px", mobile: "10px" }
      },
      // Info 区样式配置 (继承自 v4.0)
      infoStyle: {
        pc: { fontSize: "10px", opacity: "0.8", titleGap: "4.2em" },
        mobile: { fontSize: "10px", opacity: "0.8", titleGap: "3.2em" },
        lineHeight: "1.4"
      },
      navigation: [
        { name: 'Works', link: 'https://works.neuepoor.com' },
        { name: '(Play)', link: 'https://play.neuepoor.com' },
        { name: 'Me', link: 'https://me.neuepoor.com' }
      ],
      infoSections: [
        { title: "Works", content: "Branding<br>Vision identity<br>Look Book<br>Interface<br>Packaging<br>Editorial<br>Apparel", span: "6" },
        { title: "Service", content: "Creative Direction<br>Art Direction<br>Graphic<br>Illustration<br>Motion<br>Typeface", span: "4" },
        { title: "Contacts", content: "Email<br>Instagram<br>Github<br>小红书<br>Wechat", span: "2" }
      ]
    };

    const DS_ENGINE = {
      async fetchData() {
        return Array(7).fill({ id: "02001", img: SITE_CONFIG.assets.testImg });
      },

      initStyles() {
        const root = document.documentElement;
        const ty = SITE_CONFIG.typography;
        const inf = SITE_CONFIG.infoStyle;
        
        root.style.setProperty('--fl-fs-nav', ty.nav.pc);
        root.style.setProperty('--fl-fs-nav-m', ty.nav.mobile);
        root.style.setProperty('--fl-fs-item', ty.item.pc);
        root.style.setProperty('--fl-fs-item-m', ty.item.mobile);
        
        root.style.setProperty('--fl-info-fs', inf.pc.fontSize);
        root.style.setProperty('--fl-info-fs-m', inf.mobile.fontSize);
        root.style.setProperty('--fl-info-op', inf.pc.opacity);
        root.style.setProperty('--fl-info-gap', inf.pc.titleGap);
        root.style.setProperty('--fl-info-gap-m', inf.mobile.titleGap);
        root.style.setProperty('--fl-info-lh', inf.lineHeight);
      },

      initThemeColor() {
        let meta = document.querySelector('meta[name="theme-color"]');
        if (!meta) {
          meta = document.createElement('meta');
          meta.name = "theme-color";
          document.head.appendChild(meta);
        }
        const updateColor = () => {
          const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--fl-bg').trim();
          meta.content = bgColor;
        };
        updateColor();
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', updateColor);
        setTimeout(updateColor, 500);
      },

      initLogo() {
        const v = document.getElementById('v'), g = document.getElementById('g'), t = document.getElementById('t');
        g.src = SITE_CONFIG.assets.logoGif;
        v.innerHTML = `<source src="${SITE_CONFIG.assets.logoVideoWebm}" type="video/webm"><source src="${SITE_CONFIG.assets.logoVideoMp4}" type='video/mp4; codecs="hvc1"'>`;
        v.play().catch(() => { v.style.display = 'none'; g.style.display = 'block'; });
        v.oncanplay = () => { v.style.display = 'block'; g.style.display = 'none'; t.style.display = 'none'; };
      },

      initScrollMonitor() {
        let scrollTimer = null;
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
          if (window.innerWidth > 768) return;
          navbar.classList.add('menu-hidden');
          clearTimeout(scrollTimer);
          scrollTimer = setTimeout(() => {
            navbar.classList.remove('menu-hidden');
          }, 250);
        }, { passive: true });
      },

      async renderUI() {
        const infoRoot = document.getElementById('info-root');
        const galleryRoot = document.getElementById('gallery-root');
        
        // 1. Info 区渲染
        infoRoot.innerHTML = SITE_CONFIG.infoSections.map(sec => `
          <div class="fl-info fl-reveal type-info" style="grid-column: span ${sec.span}">
            <b class="fl-info__title">${sec.title}</b>
            ${sec.content}
          </div>
        `).join('');
        
        // 2. Gallery 区渲染 (使用 <img> 实现自适应比例)
        const projects = await this.fetchData();
        const galleryHTML = projects.map((item, index) => `
          <div class="fl-item-wrapper fl-reveal">
            <div class="type-item-container">
              <span class="type-item">Project ${String(index + 1).padStart(2, '0')}</span>
            </div>
            <a href="#" class="fl-item">
              <img src="${item.img}" alt="Project Image" loading="lazy">
            </a>
          </div>
        `).join('');

        const archiveHTML = `
          <div class="fl-archive-wrapper fl-reveal">
            <a href="/Archive/index.html" class="type-archive">Archive</a>
          </div>
        `;
        
        galleryRoot.innerHTML = galleryHTML + archiveHTML;
        this.initReveal();
      },

      initReveal() {
        const observer = new IntersectionObserver((entries) => { 
            entries.forEach(entry => { 
                if (entry.isIntersecting) { 
                    entry.target.classList.add('is-visible'); 
                    observer.unobserve(entry.target); 
                } 
            }); 
        }, { threshold: 0.1 });
        document.querySelectorAll('.fl-reveal').forEach(el => observer.observe(el));
      },

      start() { 
        this.initStyles(); 
        this.initThemeColor();
        this.initLogo(); 
        this.initScrollMonitor(); 
        document.getElementById('ls').innerHTML = SITE_CONFIG.navigation.map(n => `<a href="${n.link}" class="fl-nav__link type-nav">${n.name}</a>`).join('');
        this.renderUI(); 
      }
    };
    DS_ENGINE.start();
  </script>
</body>
</html>
